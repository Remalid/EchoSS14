- type: entity
  name: pen
  parent: BaseItem
  id: Pen
  description: A dark ink pen.
  components:
  - type: Sprite
    sprite: _ECHO/Objects/Misc/pens_storage.rsi #ECHO-Tweak Было: Objects/Misc/pens.rsi -> Стало: _ECHO/Objects/Misc/pens_storage.rsi
#    state: pen #ECHO-Tweak-GenericVisualizer
#ECHO-Tweak-Start Стейты спрайтов в инвентаре
    layers:
    - state: pen
      map: ["pen"] # требуется для работы слоёв
  - type: ContainerSprite
  - type: Appearance
  - type: GenericVisualizer
    visuals:
      enum.ContainerSpriteState.State:
        pen:
          True: {sprite: _ECHO/Objects/Misc/pens_storage.rsi}
          False: {sprite: _ECHO/Objects/Misc/pens.rsi}
#ECHO-Tweak-End Стейты спрайтов в инвентаре
  - type: Item
    sprite: _ECHO/Objects/Misc/pens.rsi #ECHO-Tweak Было: Objects/Misc/pens.rsi -> Стало: _ECHO/Objects/Misc/pens.rsi
    heldPrefix: pen
    size: Tiny
  - type: Tag
    tags:
    - Write
    - Pen
  - type: PhysicalComposition
    materialComposition:
      Steel: 25
  - type: EmitSoundOnUse
    sound:
      path: /Audio/Items/pen_click.ogg
      params:
        volume: -4
        maxDistance: 2
  - type: UseDelay
    delay: 1.5
  - type: Fixtures
    fixtures:
      fix1:
        shape: !type:PolygonShape
          vertices:
          - -0.3,0.1
          - -0.1,0.3
          - 0.3,-0.1
          - 0.1,-0.3
        density: 20 # derived from base_item
        mask:
        - ItemMask
        restitution: 0.3
        friction: 0.2

- type: entity
  parent: Pen
  id: PenEmbeddable
  abstract: true
  components:
  - type: EmbeddableProjectile
    offset: 0.3,0.0
    removalTime: 0.0
  - type: ThrowingAngle
    angle: 270 #ECHO-Tweak Было: 315 -> Стало: 270
  - type: LandAtCursor
  - type: DamageOtherOnHit
    damage:
      types:
        Piercing: 3

#TODO: I want the luxury pen to write a cool font like Merriweather in the future.

- type: entity
  name: luxury pen
  parent: Pen
  id: LuxuryPen
  description: A fancy and expensive pen that you only deserve to own if you're qualified to handle vast amounts of paperwork.
  components:
  - type: Sprite
#    state: luxury_pen #ECHO-Tweak-GenericVisualizer
#ECHO-Tweak-start Стейты спрайтов в инвентаре
    layers:
    - state: luxury_pen
      map: ["luxury_pen"] # требуется для работы слоёв
  - type: GenericVisualizer
    visuals:
      enum.ContainerSpriteState.State:
        luxury_pen:
          True: {sprite: _ECHO/Objects/Misc/pens_storage.rsi}
          False: {sprite: _ECHO/Objects/Misc/pens.rsi}
#ECHO-Tweak-End Стейты спрайтов в инвентаре
  - type: Item
    heldPrefix: luxury_pen

- type: entity
  id: BaseAdvancedPen
  parent: PenEmbeddable
  abstract: true
  components:
  - type: Tag
    tags:
    - Write
    - WriteIgnoreStamps
    - Pen
  - type: MeleeWeapon
    wideAnimationRotation: -45
    damage:
      types:
        Piercing: 15
    soundHit:
      path: /Audio/Weapons/bladeslice.ogg
  - type: Tool
    qualities:
    - Screwing
    useSound:
      collection: Screwdriver

- type: entity
  name: Cybersun pen
  parent: [BaseAdvancedPen, BaseSyndicateContraband]
  id: CyberPen
  description: A high-tech pen straight from Cybersun's legal department, capable of refracting hard-light at impossible angles through its diamond tip in order to write. So powerful, it's even able to rewrite officially stamped documents should the need arise.
  components:
  - type: Sprite
#    state: overpriced_pen #ECHO-Tweak-GenericVisualizer
#ECHO-Tweak-start Стейты спрайтов в инвентаре
    layers:
    - state: overpriced_pen
      map: ["overpriced_pen"] # требуется для работы слоёв
  - type: GenericVisualizer
    visuals:
      enum.ContainerSpriteState.State:
        overpriced_pen:
          True: {sprite: _ECHO/Objects/Misc/pens_storage.rsi}
          False: {sprite: _ECHO/Objects/Misc/pens.rsi}
#ECHO-Tweak-End Стейты спрайтов в инвентаре
  - type: Item
    heldPrefix: overpriced_pen
  - type: StaticPrice
    price: 500

