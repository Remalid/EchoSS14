- type: entity
  name: echo base sofa
  id: EchoSofaBase
  parent: [SeatBase, BaseStructure] 
  description: It looks comfy.
  abstract: true
  components:
  - type: Transform
    anchored: true
  - type: Physics
    bodyType: Static
  - type: Anchorable
  - type: Rotatable
  - type: Fixtures 
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
        density: 190
        mask:
        - TableMask
  - type: HealOnBuckle
    damage:
      types:
        Poison: -0.1
        Blunt: -0.1
  - type: Strap
    position: Down
    rotation: 0 
  - type: StaticPrice
    price: 50

- type: entity
  name: black sofa left side
  id: EchoSofaCutBlackLeftSide
  parent: EchoSofaBase
  components:
  - type: Sprite
    sprite: _ECHO/Structures/Furniture/Sofas/sofa_black_cut.rsi
    state: sofa_left
  - type: Construction
    graph: _ECHOSeat
    node: adtsofacutblackleft

