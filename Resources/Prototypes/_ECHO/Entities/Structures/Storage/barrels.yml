- type: entity
  parent: BaseBarrelChem
  id: BaseBarrelChemOpen
  abstract: true
  name: open barrel
  description: An open barrel that can be filled with liquids.
  components:
  - type: Appearance
  - type: Openable
    opened: true
  - type: SolutionContainerVisuals
    maxFillLevels: 5
    fillBaseName: "fill-"
    solutionName: tank
  - type: Edible
    solution: tank
    utensil: None
  - type: MixableSolution
    solution: tank
  - type: SolutionTransfer
    canChangeTransferAmount: true
  - type: DrawableSolution
    solution: tank
  - type: RefillableSolution
    solution: tank
  - type: DrainableSolution
    solution: tank
  - type: Spillable
    solution: tank
  - type: ExaminableSolution
    solution: tank
  - type: ReagentTank

- type: entity
  parent: BaseBarrelChemOpen
  id: EchoBarrelChemWaterOpen
  name: open water barrel
  description: An open barrel that can be filled with liquids.
  components:
  - type: Sprite
    state: waterbarrel-open
    noRot: true
    layers:
    - state: waterbarrel-open
    - map: ["enum.SolutionContainerLayers.Fill"]
      state: fill-1
      visible: false
  - type: SolutionContainerManager
    solutions:
      tank:
        maxVol: 500
        reagents:
        - ReagentId: Water
          Quantity: 500

