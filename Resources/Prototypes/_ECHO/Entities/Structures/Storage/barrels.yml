  - type: SolutionContainerManager
    solutions:
      tank:
        maxVol: 500

- type: entity
  parent: BaseBarrelChem
  id: EchoBarrelIED
  name: IED barrel
  description: A suspicious barrel with welding fuel. It looks dangerous.
  components:
  - type: Sprite
    state: iedweldbarrel
  - type: Explosive
    explosionType: Default
    totalIntensity: 20
  - type: SolutionContainerManager
