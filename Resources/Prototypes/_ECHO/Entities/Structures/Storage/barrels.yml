
- type: entity
  parent: BaseBarrelChem
  id: EchoBarrelChemWater
  suffix: Water
  name: water barrel
  description: A barrel filled with water.
  components:
  - type: Sprite
    state: waterbarrel
  - type: SolutionContainerManager
    solutions:
      tank:
        maxVol: 500
        reagents:
        - ReagentId: Water
          Quantity: 500

- type: entity
  parent: BaseBarrelChem
  id: EchoBarrelChemWelding
  suffix: Welding
  name: welding fuel barrel
  description: A barrel filled with welding fuel.
  components:
  - type: Sprite
    state: weldbarrel
  - type: Explosive
    explosionType: Default
    totalIntensity: 10
  - type: SolutionContainerManager
    solutions:
      tank:
        maxVol: 500
        reagents:
        - ReagentId: WeldingFuel
          Quantity: 500

- type: entity
  parent: BaseBarrelChem
